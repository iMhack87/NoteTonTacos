<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un Tacos - Note Ton Tacos</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .custom-add { display: flex; gap: 0.5rem; margin-top: 1rem; }
  </style>
</head>
<body>
  
  <header>
    <div class="container header-content">
      <a href="index.html" class="logo">
        <span>🌮</span> Note Ton Tacos
      </a>
      <div id="user-ui"></div>
    </div>
  </header>

  <main class="main-content container">
    <div style="max-width: 800px; margin: 0 auto;">
      <h1 class="text-gradient" style="font-size: 2.5rem; margin-bottom: 2rem;">Composez Votre Chef-d'œuvre</h1>
      
      <div class="glass-panel">
        <form id="create-form">
          <div class="form-group">
            <label class="form-label">Nom de votre création</label>
            <input type="text" id="taco-name" class="form-control" placeholder="Le Tacos Giga-Cheese" required>
          </div>
          
          <div class="form-group" style="margin-top: 2rem;">
            <label class="form-label">Taille</label>
            <div class="checkbox-grid">
              <div class="checkbox-item">
                <input type="radio" name="size" id="s-simple" value="Simple" checked>
                <label for="s-simple">1 Viande (Simple)</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="size" id="s-double" value="Double">
                <label for="s-double">2 Viandes (Double)</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="size" id="s-maxi" value="Maxi">
                <label for="s-maxi">3 Viandes (Maxi)</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="size" id="s-giga" value="Giga">
                <label for="s-giga">4+ Viandes (Giga)</label>
              </div>
            </div>
          </div>

          <div class="form-group" style="margin-top: 2rem;">
            <label class="form-label">Viandes & Plats</label>
            <div class="checkbox-grid" id="meats-grid">
              <div class="checkbox-item"><input type="checkbox" name="meats" id="m-poulet" value="Poulet Mariné"><label for="m-poulet">Poulet Mariné</label></div>
              <div class="checkbox-item"><input type="checkbox" name="meats" id="m-hache" value="Viande Hachée"><label for="m-hache">Viande Hachée</label></div>
              <div class="checkbox-item"><input type="checkbox" name="meats" id="m-cordon" value="Cordon Bleu"><label for="m-cordon">Cordon Bleu</label></div>
              <div class="checkbox-item"><input type="checkbox" name="meats" id="m-tenders" value="Tenders"><label for="m-tenders">Tenders</label></div>
              <div class="checkbox-item"><input type="checkbox" name="meats" id="m-merguez" value="Merguez"><label for="m-merguez">Merguez</label></div>
              <div class="checkbox-item"><input type="checkbox" name="meats" id="m-falafel" value="Falafel"><label for="m-falafel">Falafel</label></div>
            </div>
            <div class="custom-add">
              <input type="text" id="custom-meat-input" class="form-control" placeholder="Ajouter une autre viande/plat...">
              <button type="button" class="btn btn-secondary" id="btn-add-meat" style="min-width: 100px;">Ajouter</button>
            </div>
          </div>

          <div class="form-group" style="margin-top: 2rem;">
            <label class="form-label">Sauces</label>
            <div class="checkbox-grid" id="sauces-grid">
              <div class="checkbox-item"><input type="checkbox" name="sauces" id="s-alg" value="Algérienne"><label for="s-alg">Algérienne</label></div>
              <div class="checkbox-item"><input type="checkbox" name="sauces" id="s-sam" value="Samouraï"><label for="s-sam">Samouraï</label></div>
              <div class="checkbox-item"><input type="checkbox" name="sauces" id="s-big" value="Biggy"><label for="s-big">Biggy</label></div>
              <div class="checkbox-item"><input type="checkbox" name="sauces" id="s-blanche" value="Blanche"><label for="s-blanche">Blanche</label></div>
              <div class="checkbox-item"><input type="checkbox" name="sauces" id="s-mayo" value="Mayonnaise"><label for="s-mayo">Mayonnaise</label></div>
              <div class="checkbox-item"><input type="checkbox" name="sauces" id="s-ketchup" value="Ketchup"><label for="s-ketchup">Ketchup</label></div>
            </div>
            <div class="custom-add">
              <input type="text" id="custom-sauce-input" class="form-control" placeholder="Ajouter une autre sauce...">
              <button type="button" class="btn btn-secondary" id="btn-add-sauce" style="min-width: 100px;">Ajouter</button>
            </div>
          </div>

          <div class="form-group" style="margin-top: 2rem;">
            <label class="form-label">Gratinnage (Optionnel)</label>
            <div class="checkbox-grid">
              <div class="checkbox-item">
                <input type="radio" name="gratinnage" id="g-none" value="" checked>
                <label for="g-none">Aucun</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="gratinnage" id="g-raclette" value="Raclette">
                <label for="g-raclette">Raclette</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="gratinnage" id="g-chevre" value="Chèvre">
                <label for="g-chevre">Chèvre Miel</label>
              </div>
              <div class="checkbox-item">
                <input type="radio" name="gratinnage" id="g-mozza" value="Mozzarella">
                <label for="g-mozza">Mozzarella</label>
              </div>
            </div>
          </div>

          <div class="form-group" style="margin-top: 2rem;">
            <label class="form-label">Description / Secret du Chef</label>
            <textarea id="description" class="form-control" rows="4" placeholder="Ce Tacos est l'équilibre parfait entre le fondant du cordon bleu et la chaleur de la sauce algérienne..."></textarea>
          </div>
          
          <div style="margin-top: 3rem; text-align: right;">
            <a href="index.html" class="btn btn-secondary" style="margin-right: 1rem;">Annuler</a>
            <button type="submit" class="btn btn-primary" style="font-size: 1.2rem; padding: 1rem 3rem;">Publier la Recette</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div class="overlay" id="login-modal">
    <div class="modal">
      <h2 style="margin-bottom: 1rem;">Connexion Requise</h2>
      <p style="margin-bottom: 2rem; color: var(--text-secondary);">Veuillez choisir un pseudo pour publier votre recette.</p>
      <form id="login-form">
        <div class="form-group">
          <input type="text" id="pseudo" class="form-control" placeholder="Ex: MaitreTacos" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
      </form>
    </div>
  </div>

  <script src="js/app.js?v=2"></script>
</body>
</html>
