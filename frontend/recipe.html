<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détails Tacos - Note Ton Tacos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <header>
    <div class="container header-content">
      <a href="index.html" class="logo">
        <span>🌮</span> Note Ton Tacos
      </a>
      <div id="user-ui"></div>
    </div>
  </header>

  <main class="main-content container">
    <div id="recipe-container" style="max-width: 900px; margin: 0 auto;">
      
      <!-- Generated via JS -->
      <div id="recipe-hero" class="recipe-hero">Chargement des données...</div>
      <div id="recipe-details" class="recipe-details-grid"></div>
      
      <!-- Ratings & Comments Area -->
      <div class="glass-panel" style="margin-top: 3rem;">
        <div style="display: grid; grid-template-columns: 1fr; gap: 3rem;">
          
          <!-- Rating Form -->
          <div>
            <h3 style="margin-bottom: 1rem; color: var(--primary-color);">Notez cette recette !</h3>
            <form id="rating-form" style="display: flex; flex-direction: column; align-items: flex-start;">
              <div class="stars">
                <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
                <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
                <input type="radio" id="star3" name="rating" value="3" /><label for="star3">★</label>
                <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
                <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
              </div>
              <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Valider ma note</button>
            </form>
          </div>
          
          <!-- Comments -->
          <div style="border-top: 1px solid var(--border-color); padding-top: 2rem;">
            <h3 style="margin-bottom: 1.5rem;">Commentaires</h3>
            
            <form id="comment-form" style="margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem;">
              <textarea id="comment-content" class="form-control" rows="3" placeholder="Qu'avez-vous pensé de ce Tacos ? Laissez votre avis !"></textarea>
              <button type="submit" class="btn btn-secondary" style="align-self: flex-end;">Publier le commentaire</button>
            </form>
            
            <div id="comments-list">
              <!-- JS Injected -->
            </div>
          </div>

        </div>
      </div>
      
    </div>
  </main>

  <!-- Login Modal -->
  <div class="overlay" id="login-modal">
    <div class="modal" style="position: relative;">
      <button id="close-modal" style="position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);">&times;</button>
      <div id="auth-tabs" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
        <button id="tab-login" class="btn btn-primary" style="flex:1;">Connexion</button>
        <button id="tab-register" class="btn btn-secondary" style="flex:1;">Inscription</button>
      </div>

      <h2 id="auth-title" style="margin-bottom: 1rem; color: var(--primary-color);">Bienvenue Gourmet !</h2>
      <p id="auth-desc" style="margin-bottom: 1.5rem; color: var(--text-secondary);">
        Entrez vos identifiants pour continuer.
      </p>

      <div id="register-warning" style="display: none; background: rgba(255, 60, 60, 0.1); border-left: 4px solid var(--accent-color); padding: 1rem; margin-bottom: 1.5rem; font-size: 0.9rem; color: #ffcccc; line-height: 1.4;">
        <strong>Attention :</strong> 🌮 Il n'y a pas de système de récupération de mot de passe par email. Si vous perdez votre mot de passe, il faudra créer un nouveau compte !
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="pseudo">Votre Pseudo</label>
          <input type="text" id="pseudo" class="form-control" placeholder="Ex: MaitreTacos99" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input type="password" id="password" class="form-control" placeholder="****" required>
        </div>
        <button type="submit" id="auth-submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
      </form>
    </div>
  </div>

  <script src="js/app.js?v=2"></script>
</body>
</html>
